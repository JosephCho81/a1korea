<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>㈜한국에이원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; background: #0a0f14; }

/* 레이아웃 설정 */
.stage { position: fixed; inset: 0; display: flex; width: 100%; height: 100%; }
.panel { position: relative; flex: 1; overflow: hidden; transition: flex 0.7s cubic-bezier(0.77,0,0.18,1); }

/* 호버 시 패널 확장 효과 */
.stage:has(.panel-raw:hover) .panel-glove { flex: 0.35; }
.stage:has(.panel-glove:hover) .panel-raw { flex: 0.35; }

.panel-bg {
  position: absolute; inset: -5%;
  background-size: cover; background-position: center;
  transition: transform 0.9s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.6s ease;
  filter: brightness(.45) saturate(.7);
  pointer-events: none;
}
.panel:hover .panel-bg { transform: scale(1.06); filter: brightness(.28) saturate(.5); }
.panel-raw .panel-bg { background-image: url('https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=1400&q=85'); }
.panel-glove .panel-bg { background-image: url('https://images.unsplash.com/photo-1576671081837-49000212a370?w=1400&q=85'); }

/* 오버레이 효과 */
.panel::after {
  content: ''; position: absolute; inset: 0;
  opacity: 0; transition: opacity .5s; pointer-events: none;
}
.panel-raw::after { background: linear-gradient(135deg, rgba(43,140,60,0) 0%, rgba(43,140,60,.18) 100%); }
.panel-glove::after { background: linear-gradient(135deg, rgba(30,90,180,0) 0%, rgba(30,90,180,.18) 100%); }
.panel:hover::after { opacity: 1; }

.divider {
  position: fixed; left: 50%; top: 0; bottom: 0; width: 1px;
  background: rgba(255,255,255,.15); z-index: 10; pointer-events: none;
}
.divider::before {
  content: 'A1KOR'; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: .5em;
  color: rgba(255,255,255,.35); background: #0a0f14; padding: 10px 0;
  writing-mode: vertical-rl; pointer-events: none;
}

.panel-content {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  justify-content: flex-end; padding: 52px; z-index: 50; /* 버튼이 위로 오도록 z-index 상향 */
}

/* 텍스트 요소들 (클릭 방해 금지) */
.p-tag, .p-title, .p-sub { pointer-events: none; }

.p-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; letter-spacing: .22em; text-transform: uppercase; margin-bottom: 16px;
  opacity: 0; transform: translateY(12px); transition: opacity .4s .1s, transform .4s .1s;
}
.panel:hover .p-tag { opacity: 1; transform: translateY(0); }
.p-tag::before { content: ''; width: 22px; height: 1px; background: currentColor; }
.panel-raw .p-tag { color: #5ec97a; }
.panel-glove .p-tag { color: #7ab4f5; }
