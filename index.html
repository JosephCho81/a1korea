<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>㈜한국에이원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

.stage {
  position: fixed; inset: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.panel {
  position: relative; overflow: hidden;
  transition: flex 0.7s cubic-bezier(0.77,0,0.18,1);
}
.stage:has(.panel-raw:hover) .panel-glove { flex: 0.35; }
.stage:has(.panel-glove:hover) .panel-raw { flex: 0.35; }

.panel-bg {
  position: absolute; inset: -5%;
  background-size: cover; background-position: center;
  transition: transform 0.9s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.6s ease;
  filter: brightness(.45) saturate(.7);
}
.panel:hover .panel-bg {
  transform: scale(1.06);
  filter: brightness(.28) saturate(.5);
}

.panel-raw .panel-bg {
  background-image: url('https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=1400&q=85');
}
.panel-glove .panel-bg {
  background-image: url('https://images.unsplash.com/photo-1576671081837-49000212a370?w=1400&q=85');
}
.panel-raw::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(43,140,60,0) 0%, rgba(43,140,60,.18) 100%);
  opacity: 0; transition: opacity .5s;
}
.panel-glove::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(30,90,180,0) 0%, rgba(30,90,180,.18) 100%);
  opacity: 0; transition: opacity .5s;
}
.panel:hover::after { opacity: 1; }

/* 세로 구분선 */
.divider {
  position: fixed; left: 50%; top: 0; bottom: 0; width: 1px;
  background: rgba(255,255,255,.15); z-index: 10; pointer-events: none;
}
.divider::before {
  content: 'A1KOR';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px; letter-spacing: .5em;
  color: rgba(255,255,255,.35);
  background: #0a0f14;
  padding: 10px 0;
  writing-mode: vertical-rl;
  pointer-events: none;
}

/* 패널 컨텐츠 */
.panel-content {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 52px 52px;
  z-index: 2;
}

/* 태그 */
.p-tag {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
  margin-bottom: 16px;
  opacity: 0; transform: translateY(12px);
  transition: opacity .4s .1s, transform .4s .1s;
}
.panel:hover .p-tag { opacity: 1; transform: translateY(0); }
.p-tag::before { content: ''; width: 22px; height: 1px; background: currentColor; }
.panel-raw .p-tag   { color: #5ec97a; }
.panel-glove .p-tag { color: #7ab4f5; }

/* 타이틀 */
.p-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 6vw, 84px);
  color: #fff; line-height: .95; letter-spacing: .03em;
  margin-bottom: 14px;
  transform: translateY(8px);
  transition: transform .5s cubic-bezier(.25,.46,.45,.94);
}
.panel:hover .p-title { transform: translateY(0); }
.p-title span {
  display: block;
  -webkit-text-stroke: 1.5px rgba(255,255,255,.25);
  color: transparent;
  transition: color .4s .15s, -webkit-text-stroke .4s;
}
.panel-raw:hover .p-title span   { color: #2B8C3C; -webkit-text-stroke-color: transparent; }
.panel-glove:hover .p-title span { color: #3b82f6; -webkit-text-stroke-color: transparent; }

/* 서브 */
.p-sub {
  font-size: 13.5px; color: rgba(255,255,255,.55);
  line-height: 1.65; max-width: 280px;
  opacity: 0; transform: translateY(10px);
  transition: opacity .4s .2s, transform .4s .2s;
  margin-bottom: 28px;
}
.panel:hover .p-sub { opacity: 1; transform: translateY(0); }

/* ── 버튼 그룹 ── */
.p-btns {
  display: flex; flex-direction: column; gap: 10px;
  opacity: 0; transform: translateY(8px);
  transition: opacity .35s .25s, transform .35s .25s;
}
.panel:hover .p-btns { opacity: 1; transform: translateY(0); }

/* 메인 버튼 (사이트 입장) */
.btn-main {
  display: inline-flex; align-items: center; gap: 12px;
  font-size: 13px; font-weight: 700; letter-spacing: .08em;
  border: none; background: none; cursor: pointer;
  font-family: inherit; padding: 0; width: fit-content;
}
.btn-main::after {
  content: ''; width: 28px; height: 1px;
  background: currentColor; transition: width .3s;
}
.btn-main:hover::after { width: 44px; }
.panel-raw   .btn-main { color: #5ec97a; }
.panel-glove .btn-main { color: #7ab4f5; }

/* 서브 버튼 (시장 뉴스) */
.btn-news {
  display: inline-flex; align-items: center; gap: 9px;
  font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.04);
  cursor: pointer; font-family: inherit;
  padding: 9px 14px; width: fit-content;
  color: rgba(255,255,255,.55);
  transition: all .25s;
}
.btn-news:hover {
  border-color: rgba(255,255,255,.4);
  background: rgba(255,255,255,.08);
  color: rgba(255,255,255,.9);
}
.panel-raw   .btn-news { border-color: rgba(94,201,122,.35); color: #5ec97a; background: rgba(43,140,60,.1); }
.panel-raw   .btn-news:hover { border-color: rgba(94,201,122,.8); background: rgba(43,140,60,.2); }
.panel-glove .btn-news { border-color: rgba(122,180,245,.35); color: #7ab4f5; background: rgba(59,130,246,.1); }
.panel-glove .btn-news:hover { border-color: rgba(122,180,245,.8); background: rgba(59,130,246,.2); }
.btn-news-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  animation: livepulse 1.6s ease-in-out infinite;
}
.panel-raw   .btn-news-dot { background: #5ec97a; }
.panel-glove .btn-news-dot { background: #7ab4f5; }
@keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:.25} }
.btn-news-arrow { font-size: 12px; margin-left: 2px; transition: transform .25s; }
.btn-news:hover .btn-news-arrow { transform: translate(2px,-2px); }

/* 헤더 */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 28px 48px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 20; pointer-events: none;
}
.header-logo { display: flex; align-items: center; gap: 12px; }
.header-logo img { height: 36px; filter: brightness(0) invert(1) opacity(.9); }
.header-logo-t { font-size: 18px; font-weight: 700; color: rgba(255,255,255,.9); letter-spacing: -.01em; }
.header-sub { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.28); }

/* 힌트 */
.hint {
  position: fixed; bottom: 36px; left: 50%;
  transform: translateX(-50%);
  z-index: 20; text-align: center; pointer-events: none;
  animation: hintfade 2.5s ease-in-out infinite;
}
@keyframes hintfade { 0%,100%{opacity:.25} 50%{opacity:.6} }
.hint span { font-size: 10.5px; letter-spacing: .24em; text-transform: uppercase; color: rgba(255,255,255,.5); }

/* 진입 애니메이션 */
.panel { opacity: 0; animation: panelin 1.1s cubic-bezier(.25,.46,.45,.94) forwards; }
.panel-raw   { animation-delay: .1s; }
.panel-glove { animation-delay: .25s; }
@keyframes panelin { from{opacity:0;transform:scale(1.04)} to{opacity:1;transform:scale(1)} }

/* 플래시 */
.flash {
  position: fixed; inset: 0; background: #fff;
  z-index: 9999; opacity: 0; pointer-events: none;
  transition: opacity .18s ease;
}
.flash.on { opacity: 1; pointer-events: all; }

/* ── 반응형 ── */
@media (max-width: 768px) {
  .stage { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; height: 100%; }
  .divider { left: 0; right: 0; top: 50%; bottom: auto; width: 100%; height: 1px; }
  .divider::before { writing-mode: horizontal-tb; top: 50%; left: 50%; }
  .p-title { font-size: clamp(40px, 10vw, 64px); }
  .panel-content { padding: 28px 28px; }
  .p-tag, .p-sub, .p-btns { opacity: 1; transform: translateY(0); }
  .panel-bg { filter: brightness(.38) saturate(.65); }
  .header { padding: 18px 24px; }
  .header-logo img { height: 26px; }
  .header-logo-t { font-size: 15px; }
  .hint { bottom: 16px; }
}
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<!-- 헤더 -->
<header class="header">
  <div class="header-logo">
    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
    <div><div class="header-logo-t">㈜한국에이원</div></div>
  </div>
  <div class="header-sub">사업 부문 선택</div>
</header>

<div class="divider"></div>

<div class="stage">

  <!-- 원자재 -->
  <div class="panel panel-raw">
    <div class="panel-bg"></div>
    <div class="panel-content">
      <div class="p-tag">원자재 사업부</div>
      <h2 class="p-title">글로벌<br>원자재<br><span>트레이딩</span></h2>
      <p class="p-sub">페로합금 · 철강 원료 · 비철금속<br>제강사 · 주조사 직접 공급</p>
      <div class="p-btns">
        <button class="btn-main" onclick="goTo('/main')">사이트 입장</button>
        <button class="btn-news" onclick="goTo('https://news.a1kor.com')">
          <span class="btn-news-dot"></span>
          LIVE · 원자재 시장 뉴스
          <span class="btn-news-arrow">↗</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 글러브 -->
  <div class="panel panel-glove">
    <div class="panel-bg"></div>
    <div class="panel-content">
      <div class="p-tag">소모품 사업부</div>
      <h2 class="p-title">니트릴<br>라텍스<br><span>글러브</span></h2>
      <p class="p-sub">니트릴 · 라텍스 · 비닐 장갑<br>산업용 · 의료용 소모품 공급</p>
      <div class="p-btns">
        <button class="btn-main" onclick="goTo('https://seshohoho.cafe24.com')">쇼핑몰 입장</button>
        <button class="btn-news" onclick="goTo('https://market.a1kor.com')">
          <span class="btn-news-dot"></span>
          LIVE · 글러브 시장 뉴스
          <span class="btn-news-arrow">↗</span>
        </button>
      </div>
    </div>
  </div>

</div>

<div class="hint"><span>사업부를 선택하세요</span></div>

<script>
function goTo(url) {
  const flash = document.getElementById('flash');
  flash.classList.add('on');
  setTimeout(() => { window.location.href = url; }, 300);
}
</script>
</body>
</html>
