<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>㈜한국에이원</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; }

.stage {
  position: fixed;
  inset: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
}

/* 🔥 panel을 a로 사용 */
.panel {
  position: relative;
  overflow: hidden;
  display: block;
  text-decoration: none;
  color: inherit;
}

/* hover 효과는 유지 */
.stage:has(.panel-raw:hover) .panel-glove { flex: 0.35; }
.stage:has(.panel-glove:hover) .panel-raw { flex: 0.35; }

.panel-bg {
  position: absolute;
  inset: -5%;
  background-size: cover;
  background-position: center;
  transition: transform 0.9s, filter 0.6s;
  filter: brightness(.45) saturate(.7);
}

.panel:hover .panel-bg {
  transform: scale(1.06);
  filter: brightness(.28) saturate(.5);
}

.panel-raw .panel-bg {
  background-image: url('https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=1400&q=85');
}

.panel-glove .panel-bg {
  background-image: url('https://images.unsplash.com/photo-1576671081837-49000212a370?w=1400&q=85');
}

.panel-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 52px;
  z-index: 5;
}

/* 텍스트 */
.p-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 6vw, 84px);
  color: #fff;
}

.p-title span {
  display: block;
  -webkit-text-stroke: 1.5px rgba(255,255,255,.25);
  color: transparent;
}

.panel-raw:hover .p-title span { color: #2B8C3C; }
.panel-glove:hover .p-title span { color: #3b82f6; }

.p-sub {
  font-size: 13px;
  color: rgba(255,255,255,.6);
  margin-top: 10px;
}

/* 버튼 (보조용) */
.p-btns {
  margin-top: 20px;
}

.btn-news {
  display: inline-block;
  font-size: 12px;
  padding: 8px 12px;
  border: 1px solid rgba(255,255,255,.2);
  text-decoration: none;
  color: #fff;
}

/* header */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 28px 48px;
  display: flex;
  justify-content: space-between;
  z-index: 20;
}

.header-logo-t {
  color: #fff;
  font-weight: 700;
}

.header-sub {
  color: rgba(255,255,255,.5);
}
</style>
</head>

<body>

<header class="header">
  <div class="header-logo-t">㈜한국에이원</div>
  <div class="header-sub">사업 부문 선택</div>
</header>

<div class="stage">

  <!-- ✅ 전체 클릭 -->
  <a href="https://a1korea.vercel.app/main" class="panel panel-raw">
    <div class="panel-bg"></div>
    <div class="panel-content">
      <h2 class="p-title">글로벌<br>원자재<br><span>트레이딩</span></h2>
      <p class="p-sub">페로합금 · 철강 원료 · 비철금속</p>

      <!-- 보조 버튼 -->
      <div class="p-btns">
        <a class="btn-news" href="https://news.a1kor.com" target="_blank" onclick="event.stopPropagation();">
          원자재 뉴스
        </a>
      </div>
    </div>
  </a>

  <!-- ✅ 전체 클릭 -->
  <a href="https://seshohoho.cafe24.com" class="panel panel-glove" target="_blank">
    <div class="panel-bg"></div>
    <div class="panel-content">
      <h2 class="p-title">니트릴<br>라텍스<br><span>글러브</span></h2>
      <p class="p-sub">산업용 · 의료용 소모품</p>

      <div class="p-btns">
        <a class="btn-news" href="https://market.a1kor.com" target="_blank" onclick="event.stopPropagation();">
          글러브 뉴스
        </a>
      </div>
    </div>
  </a>

</div>

</body>
</html>
